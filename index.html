<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRN PROJECT OFFICIAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --orange: #FF9900; --black: #000; --gray: #1b1b1b; --dark: #111; }
        
        body { 
            font-family: 'Arial Black', sans-serif; 
            background: var(--black); 
            color: #fff; 
            margin: 0; 
            padding: 0; 
            user-select: none;
            overflow-x: hidden;
        }

        /* Навигация */
        .nav { 
            display: flex; 
            justify-content: space-around; 
            background: var(--dark); 
            padding: 18px 0; 
            border-bottom: 2px solid var(--orange); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .nav-item { color: #fff; font-size: 11px; cursor: pointer; font-weight: bold; text-transform: uppercase; opacity: 0.5; transition: 0.3s; }
        .nav-item.active { color: var(--orange); opacity: 1; transform: scale(1.1); }

        .section { display: none; padding: 20px; text-align: center; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Карточки */
        .card { 
            background: var(--gray); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            margin-bottom: 15px; 
            transition: 0.2s;
        }
        .card:active { transform: scale(0.97); border-color: var(--orange); }

        .btn { 
            background: var(--orange); 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            color: #000; 
            margin-top: 10px; 
            text-transform: uppercase; 
            font-size: 12px;
        }

        /* Рулетка */
        .case-view { 
            position: relative; 
            height: 130px; 
            background: var(--dark); 
            overflow: hidden; 
            border: 2px solid var(--orange); 
            border-radius: 15px; 
            margin: 25px 0; 
        }
        .pointer { 
            position: absolute; 
            left: 50%; 
            top: 0; 
            width: 4px; 
            height: 100%; 
            background: var(--orange); 
            z-index: 10; 
            transform: translateX(-50%); 
            box-shadow: 0 0 15px var(--orange);
        }
        .tape { display: flex; position: absolute; left: 0; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); padding-left: 50%; }
        .t-item { 
            min-width: 120px; 
            height: 110px; 
            margin: 10px; 
            background: var(--gray); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 12px; 
            border-bottom: 4px solid #333;
        }

        /* Модалки */
        .modal { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: var(--gray); 
            padding: 30px; 
            border: 2px solid var(--orange); 
            z-index: 3000; 
            width: 80%; 
            border-radius: 25px; 
            box-shadow: 0 0 50px #000; 
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2500; }
        .form-input { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            background: #000; 
            border: 1px solid #444; 
            color: #fff; 
            border-radius: 10px; 
            box-sizing: border-box; 
            outline: none;
        }
        .form-input:focus { border-color: var(--orange); }
    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-item active" onclick="tab('shop', this)">МАГАЗИН</div>
        <div class="nav-item" onclick="tab('cases', this)">КЕЙСЫ</div>
        <div class="nav-item" onclick="tab('cart', this)">КОРЗИНА (<span id="c-count">0</span>)</div>
    </div>

    <div id="shop" class="section active">
        <div style="background:var(--gray); padding:15px; border-radius:12px; margin-bottom:20px; border-left:4px solid var(--orange);">
            МОЙ БАЛАНС: <span style="color:var(--orange)">1500 PRN</span>
        </div>
        <div id="shop-items"></div>
    </div>

    <div id="cases" class="section">
        <h2 style="color:var(--orange)">РУЛЕТКА УДАЧИ</h2>
        <div class="case-view">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
        <button class="btn" id="spin-btn" onclick="spin()">КРУТИТЬ ЗА 200 PRN</button>
    </div>

    <div id="cart" class="section">
        <h2 style="color:var(--orange)">ВАШИ ТОВАРЫ</h2>
        <div id="cart-list"></div>
        <div id="cart-res" style="display:none; margin-top:30px;">
            <p style="font-size:18px;">ИТОГО: <span id="total-val" style="color:var(--orange)">0</span> PRN</p>
            <button class="btn" style="background:#31b545; color:#fff;" onclick="openForm('buy')">ОФОРМИТЬ ЗАКАЗ</button>
        </div>
    </div>

    <div id="order-overlay" class="overlay"></div>
    <div id="order-modal" class="modal">
        <h3 id="form-title" style="color:var(--orange); margin-top:0;">БЛАНК ВЫДАЧИ</h3>
        <p style="font-size:11px; color:#777;">Введите ваши игровые данные:</p>
        <input type="text" id="f-nick" class="form-input" placeholder="Ваш ник:">
        <input type="text" id="f-tg" class="form-input" placeholder="Ваш @username:">
        <input type="text" id="f-gameid" class="form-input" placeholder="Ваш ID в игре:">
        <button class="btn" style="background:#31b545; color:#fff;" onclick="sendData()">ОТПРАВИТЬ БОССУ</button>
        <button class="btn" style="background:#444; color:#fff;" onclick="closeForm()">ОТМЕНА</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // АДРЕС ДЛЯ ЛОКАЛЬНОГО ТЕСТА
        const API_URL = "http://localhost:8080/api/data";
        
        let cart = []; let curAct = ""; let winP = "";

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // Наполнение магазина
        const sCont = document.getElementById('shop-items');
        const items = ["VIP ДОСТУП", "НАБОР ОРУЖИЯ", "РЕДКИЙ СКИН", "КЕЙС COINS", "БАТТЛ ПАСС", "АДМИН ПАНЕЛЬ"];
        items.forEach((name, i) => {
            let price = (i + 1) * 150;
            sCont.innerHTML += `
                <div class="card">
                    <b style="font-size:16px;">${name}</b><br>
                    <span style="color:var(--orange)">${price} PRN</span>
                    <button class="btn" onclick="add('${price}', '${name}')">В КОРЗИНУ</button>
                </div>`;
        });

        function add(p, n) { 
            cart.push({p, n}); 
            document.getElementById('c-count').innerText = cart.length; 
            renderCart();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function renderCart() {
            const list = document.getElementById('cart-list'); 
            list.innerHTML = ""; let t = 0;
            cart.forEach(i => { 
                t += parseInt(i.p); 
                list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between;"><span>${i.n}</span><b>${i.p}</b></div>`; 
            });
            document.getElementById('total-val').innerText = t;
            document.getElementById('cart-res').style.display = cart.length ? 'block' : 'none';
        }

        function openForm(type, p = "") { 
            curAct = type; winP = p; 
            document.getElementById('form-title').innerText = type === 'buy' ? "БЛАНК ЗАКАЗА" : "ПОЛУЧЕНИЕ ПРИЗА";
            document.getElementById('order-modal').style.display = 'block'; 
            document.getElementById('order-overlay').style.display = 'block'; 
        }

        function closeForm() { 
            document.getElementById('order-modal').style.display = 'none'; 
            document.getElementById('order-overlay').style.display = 'none'; 
        }

        async function sendData() {
            const nick = document.getElementById('f-nick').value;
            const tgz = document.getElementById('f-tg').value;
            const gid = document.getElementById('f-gameid').value;
            if(!nick || !tgz || !gid) return tg.showAlert("Заполните все поля анкеты!");

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: curAct, 
                        user_id: tg.initDataUnsafe?.user?.id, 
                        player_data: { nick, tg: tgz, game_id: gid }, 
                        items: cart, 
                        win: winP, 
                        total: document.getElementById('total-val').innerText 
                    })
                });
                
                if(response.ok) {
                    tg.showAlert("УСПЕШНО! Данные отправлены боту.");
                    if(curAct === 'buy') { cart = []; renderCart(); document.getElementById('c-count').innerText = 0; }
                    closeForm();
                } else {
                    tg.showAlert("Ошибка сервера: " + response.status);
                }
            } catch(e) { 
                tg.showAlert("Бот не отвечает! Убедитесь, что запущен main.py на localhost:8080"); 
            }
        }

        // Рулетка
        const tape = document.getElementById('tape'); 
        const pList = ["VIP", "SKIN", "1000 COINS", "ELITE CASE", "SWORD"];
        for(let i=0; i<60; i++) {
            tape.innerHTML += `<div class="t-item"><b>${pList[i % pList.length]}</b></div>`;
        }

        function spin() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true; btn.style.opacity = "0.5";
            
            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";
            
            const idx = 45;
            const win = tape.children[idx].innerText;
            
            setTimeout(() => {
                tape.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.1, 1)";
                tape.style.transform = `translateX(-${idx * 140}px)`;
            }, 50);

            setTimeout(() => { 
                btn.disabled = false; btn.style.opacity = "1";
                openForm('spin', win); 
                tg.HapticFeedback.notificationOccurred('success');
            }, 5500);
        }
    </script>
</body>
</html>
