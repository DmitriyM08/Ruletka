<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRN PROJECT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --orange: #FF9900; --black: #000; --gray: #1b1b1b; }
        body { font-family: 'Arial Black', sans-serif; background: var(--black); color: #fff; margin: 0; padding: 0; }
        
        /* Фиксированный ID в углу */
        .user-id-badge {
            position: fixed;
            top: 60px; /* Чуть ниже навигации */
            right: 10px;
            background: rgba(255, 153, 0, 0.2);
            border: 1px solid var(--orange);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 10px;
            color: var(--orange);
            z-index: 200;
            pointer-events: none; /* Чтобы не мешал кликам */
        }

        .nav { display: flex; justify-content: space-around; background: #111; padding: 15px 0; border-bottom: 2px solid var(--orange); position: sticky; top: 0; z-index: 100; }
        .nav-item { color: #fff; font-size: 10px; text-transform: uppercase; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--orange); }

        .section { display: none; padding: 20px; text-align: center; }
        .section.active { display: block; }

        /* Магазин */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { background: var(--gray); padding: 15px; border-radius: 10px; border: 1px solid #333; position: relative; }
        .btn { background: var(--orange); border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }

        /* Корзина */
        .cart-item { background: #222; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; }

        /* Рулетка */
        .case-view { position: relative; width: 100%; height: 130px; background: #111; margin: 40px 0 20px 0; overflow: hidden; border: 2px solid var(--orange); }
        .pointer { position: absolute; left: 50%; width: 4px; height: 100%; background: var(--orange); z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); will-change: transform; }
        .t-item { min-width: 100px; height: 110px; margin: 10px; background: var(--gray); display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #444; font-size: 12px; }

        /* Модалка */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--gray); padding: 25px; border: 2px solid var(--orange); z-index: 1000; width: 85%; border-radius: 15px; box-shadow: 0 0 20px var(--orange); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
    </style>
</head>
<body>
    <div class="user-id-badge">ВАШ АЙДИ = "<span id="display-id">LOADING...</span>"</div>

    <div class="nav">
        <div class="nav-item active" onclick="tab('home')">ГЛАВНАЯ</div>
        <div class="nav-item" onclick="tab('shop')">МАГАЗИН</div>
        <div class="nav-item" onclick="tab('cart')">КОРЗИНА (<span id="c-count">0</span>)</div>
        <div class="nav-item" onclick="tab('cases')">КЕЙСЫ</div>
        <div class="nav-item" onclick="tab('balance')">БАЛАНС</div>
    </div>

    <div id="home" class="section active">
        <img src="logo.png" style="width:100%; border-radius:10px;">
        <h1 style="color:var(--orange)">PRN | PROJECT</h1>
        <p>Ваш баланс: <span id="b1" style="color:var(--orange)">1500</span> PRN</p>
    </div>

    <div id="shop" class="section">
        <div class="shop-grid" id="s-cont"></div>
    </div>

    <div id="cart" class="section">
        <h2 style="color:var(--orange)">ВАША КОРЗИНА</h2>
        <div id="cart-list"></div>
        <div id="cart-total" style="margin:20px 0; font-size:18px;"></div>
        <button id="buy-btn" class="btn" style="background:#31b545; color:#fff; display:none;" onclick="checkout()">ПОДТВЕРДИТЬ ПОКУПКУ</button>
    </div>

    <div id="cases" class="section">
        <div class="case-view"><div class="pointer"></div><div class="tape" id="tape"></div></div>
        <button id="s-btn" class="btn" onclick="spin()">КРУТИТЬ (200 PRN)</button>
    </div>

    <div id="balance" class="section">
        <h2 style="color:var(--orange)">ПОПОЛНЕНИЕ</h2>
        <p>Курс: 0.1$ = 1 PRN</p>
        <a href="https://t.me/send?start=IV0skmNajSuj" style="color:#0088cc; text-decoration:none; font-size:20px; font-weight:bold;">КРИПТОБОТ</a>
        <p style="margin-top:20px">USDT TRC20 (нажми для копии):</p>
        <div style="color:var(--orange); font-size:12px; border: 1px dashed var(--orange); padding: 10px;" onclick="copy()">TVwEBcpL5nxuvUPxgwWYix7f7WcnWAjttA</div>
    </div>

    <div id="over" class="overlay" onclick="closeM()"></div>
    <div id="win" class="modal">
        <h2 id="m-title" style="color:var(--orange)"></h2>
        <p id="m-text" style="font-size:14px;"></p>
        <button class="btn" onclick="closeM()">ПОНЯЛ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let bal = 1500; let cart = []; let spinning = false;
        const items = ["VIP КАРТА", "500 COINS", "РЕДКИЙ СКИН", "ОБЫЧНЫЙ ЯЩИК", "НОЖ"];

        // Установка ID
        const userId = tg.initDataUnsafe?.user?.id || "НЕИЗВЕСТНО";
        document.getElementById('display-id').innerText = userId;

        function tab(t) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        const sCont = document.getElementById('s-cont');
        for(let i=1; i<=20; i++){
            let p = 100 + (i*50);
            sCont.innerHTML += `<div class="card">📦<br>Товар ${i}<br><span style="color:var(--orange)">${p} PRN</span><button class="btn" onclick="toCart('Товар ${i}', ${p})">В КОРЗИНУ</button></div>`;
        }

        function toCart(n, p) {
            cart.push({n, p});
            document.getElementById('c-count').innerText = cart.length;
            tg.HapticFeedback.impactOccurred('medium');
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = ""; let total = 0;
            cart.forEach((it) => {
                total += it.p;
                list.innerHTML += `<div class="cart-item"><span>${it.n}</span><span>${it.p} PRN</span></div>`;
            });
            document.getElementById('cart-total').innerText = cart.length ? `ИТОГО К СПИСАНИЮ: ${total} PRN` : "КОРЗИНА ПУСТА";
            document.getElementById('buy-btn').style.display = cart.length ? 'block' : 'none';
        }
        setInterval(renderCart, 600);

        function checkout() {
            let total = cart.reduce((a, b) => a + b.p, 0);
            if(bal < total) return tg.showAlert("Мало коинов, босс!");
            bal -= total; updateB();
            
            // Отправляем данные админу
            tg.sendData(JSON.stringify({action: "buy", items: cart, total: total, user_id: userId}));
            
            showM("ГОТОВО!", "Выдача ресурсов в течение часа. Будьте онлайн в игре. Или скоро с вами свяжется администратор.");
            cart = []; document.getElementById('c-count').innerText = 0;
        }

        const tape = document.getElementById('tape');
        function fill() {
            tape.innerHTML = "";
            for(let i=0; i<80; i++) tape.innerHTML += `<div class="t-item">${items[Math.floor(Math.random()*items.length)]}</div>`;
        }
        fill();

        function spin() {
            if(spinning || bal < 200) return;
            bal -= 200; updateB(); spinning = true;
            const btn = document.getElementById('s-btn'); btn.disabled = true; btn.style.opacity = 0.5;
            
            tape.style.transition = "none"; tape.style.transform = "translateX(0)";
            setTimeout(() => {
                const x = 2000 + Math.random() * 2000;
                tape.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.1, 1)";
                tape.style.transform = `translateX(-${x}px)`;
            }, 50);

            setTimeout(() => {
                spinning = false; btn.disabled = false; btn.style.opacity = 1;
                let win = items[Math.floor(Math.random()*items.length)];
                showM("ВЫИГРЫШ!", `Вы выбили: ${win}. Админ получил уведомление!`);
                tg.sendData(JSON.stringify({action: "spin", win: win, user_id: userId}));
            }, 5500);
        }

        function updateB() { document.getElementById('b1').innerText = bal; }
        function showM(t, txt) { 
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-text').innerText = txt;
            document.getElementById('win').style.display = 'block';
            document.getElementById('over').style.display = 'block';
        }
        function closeM() { document.getElementById('win').style.display = 'none'; document.getElementById('over').style.display = 'none'; }
        function copy() { navigator.clipboard.writeText("TVwEBcpL5nxuvUPxgwWYix7f7WcnWAjttA"); tg.showAlert("Скопировано!"); }
    </script>
</body>
</html>
