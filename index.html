<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRN PROJECT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --orange: #FF9900;
            --black: #000000;
            --gray: #1b1b1b;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--black);
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Навигация сверху */
        .nav {
            display: flex;
            justify-content: space-around;
            background: #111;
            padding: 15px 0;
            border-bottom: 2px solid var(--orange);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-item {
            color: white;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-item.active {
            color: var(--orange);
        }

        /* Контент секций */
        .section { display: none; padding: 20px; text-align: center; }
        .section.active { display: block; }

        /* ГЛАВНАЯ СТРАНИЦА */
        .home-logo {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .main-title {
            font-size: 32px;
            color: var(--orange);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .balance-info {
            margin-top: 15px;
            font-size: 18px;
        }

        /* МАГАЗИН */
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .item-card {
            background: var(--gray);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .item-card:hover { border-color: var(--orange); }

        .price { color: var(--orange); font-weight: bold; margin-top: 10px; }

        /* КЕЙСЫ (CS:GO STYLE) */
        .case-container {
            position: relative;
            width: 100%;
            height: 150px;
            background: #111;
            margin: 30px 0;
            overflow: hidden;
            border: 2px solid var(--orange);
        }

        .pointer {
            position: absolute;
            left: 50%;
            width: 4px;
            height: 100%;
            background: var(--orange);
            z-index: 10;
            transform: translateX(-50%);
        }

        .tape {
            display: flex;
            position: absolute;
            left: 0;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .tape-item {
            min-width: 120px;
            height: 130px;
            margin: 10px;
            background: var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-bottom: 4px solid #555;
        }

        .btn-spin {
            background: var(--orange);
            color: black;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-item active" onclick="openTab('home')">ГЛАВНАЯ</div>
        <div class="nav-item" onclick="openTab('shop')">МАГАЗИН</div>
        <div class="nav-item" onclick="openTab('cases')">КЕЙСЫ</div>
        <div class="nav-item" onclick="openTab('balance')">БАЛАНС</div>
    </div>

    <div id="home" class="section active">
        <img src="logo.png" alt="PRN PROJECT" class="home-logo">
        <div class="main-title">PRN | PROJECT</div>
        <div class="balance-info">Баланс: <span style="color:var(--orange)">1500</span> PRN Coins</div>
    </div>

    <div id="shop" class="section">
        <div class="shop-grid" id="shop-content"></div>
    </div>

    <div id="cases" class="section">
        <div class="case-container">
            <div class="pointer"></div>
            <div class="tape" id="tape"></div>
        </div>
        <button class="btn-spin" onclick="startSpin()">ОТКРЫТЬ КЕЙС (200 PRN)</button>
    </div>

    <div id="balance" class="section">
        <h1 style="color:var(--orange)">БАЛАНС</h1>
        <p>Здесь пока ничего нет, мой босс.</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openTab(tabId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Заполнение магазина
        const shopContainer = document.getElementById('shop-content');
        for (let i = 1; i <= 20; i++) {
            const price = Math.floor(Math.random() * 1000) + 100;
            shopContainer.innerHTML += `
                <div class="item-card">
                    <div style="font-size:40px">📦</div>
                    <div>Товар ${i}</div>
                    <div class="price">${price} PRN</div>
                </div>
            `;
        }

        // Логика рулетки
        const tape = document.getElementById('tape');
        const items = ["VIP", "Gold", "Skins", "Money", "Box", "Key", "Ammo"];
        
        function fillTape() {
            tape.innerHTML = "";
            for (let i = 0; i < 60; i++) {
                const randItem = items[Math.floor(Math.random() * items.length)];
                tape.innerHTML += `<div class="tape-item"><b>${randItem}</b></div>`;
            }
        }
        fillTape();

        function startSpin() {
            tape.style.transition = "none";
            tape.style.transform = "translateX(0px)";
            
            setTimeout(() => {
                const stopAt = 3000 + Math.random() * 1000;
                tape.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.1, 1)";
                tape.style.transform = `translateX(-${stopAt}px)`;
            }, 50);
        }
    </script>
</body>
</html>
