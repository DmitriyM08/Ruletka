<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRN Project</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #FF9900; /* Порнхаб-оранжевый */
            --bg: #000000;
            --card-bg: rgba(27, 27, 27, 0.9); /* Полупрозрачный фон для карточек */
            --text: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            /* Ссылка на твой большой арт для фона. Затемняем его на 80% */
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('link_to_your_big_art.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Чтобы фон не скроллился */
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Обновленная шапка */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 20px;
            background: linear-gradient(180deg, rgba(34,34,34,0.9) 0%, rgba(0,0,0,1) 100%);
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 5px 15px rgba(255, 153, 0, 0.3);
        }

        .logo-img {
            width: 100px; /* Размер твоего золотого символа */
            height: auto;
            margin-bottom: 10px;
        }

        .project-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .balance {
            font-size: 16px;
            color: #ccc;
            margin-top: 5px;
        }
        
        .coins-count {
            color: var(--primary);
            font-weight: bold;
        }

        /* Остальные стили из прошлого кода... (навигация, магазин, кейсы) */
        
        /* Немного подправим навигацию, чтобы она гармонировала */
        .nav {
            display: flex;
            justify-content: space-around;
            background: rgba(17, 17, 17, 0.9);
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }

        .nav-item {
            color: #888;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.3s;
        }

        .nav-item.active {
            color: var(--primary);
        }
        
        /* Подкрутим стиль карточек магазина */
        .product-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #333;
            transition: transform 0.2s, border-color 0.3s;
        }

        .product-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-5px);
        }

    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="PRN Logo" class="logo-img" onerror="this.style.display='none';">
        <div class="project-title">PRN | ПРОЕКТ</div>
        <div class="balance">Баланс: <span class="coins-count" id="coins">1500</span> PRN Coins</div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="openTab('shop')">МАГАЗИН</div>
        <div class="nav-item" onclick="openTab('cases')">КЕЙСЫ</div>
    </div>
    
    </body>
</html>
