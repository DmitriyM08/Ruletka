<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRN PROJECT | OFFICIAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --orange: #FF9900; --black: #000; --gray: #1b1b1b; --dark-gray: #111; }
        
        body { 
            font-family: 'Arial Black', sans-serif; 
            background: var(--black); 
            color: #fff; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Навигация */
        .nav { 
            display: flex; 
            justify-content: space-around; 
            background: var(--dark-gray); 
            padding: 15px 0; 
            border-bottom: 2px solid var(--orange); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .nav-item { color: #fff; font-size: 10px; text-transform: uppercase; cursor: pointer; font-weight: bold; opacity: 0.6; transition: 0.3s; }
        .nav-item.active { color: var(--orange); opacity: 1; transform: scale(1.1); }

        .section { display: none; padding: 20px; text-align: center; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Карточки товаров */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .card { 
            background: var(--gray); 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            position: relative; 
            overflow: hidden;
            transition: 0.2s;
        }
        .card:active { transform: scale(0.95); border-color: var(--orange); }
        
        .btn { 
            background: var(--orange); 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            color: #000; 
            margin-top: 10px; 
            font-size: 11px; 
            text-transform: uppercase;
        }

        /* Рулетка */
        .case-container { margin: 40px 0; position: relative; }
        .case-view { 
            position: relative; 
            width: 100%; 
            height: 120px; 
            background: var(--dark-gray); 
            overflow: hidden; 
            border: 2px solid var(--orange); 
            border-radius: 12px; 
        }
        .pointer { 
            position: absolute; 
            left: 50%; 
            top: 0; 
            width: 4px; 
            height: 100%; 
            background: var(--orange); 
            z-index: 10; 
            transform: translateX(-50%); 
            box-shadow: 0 0 15px var(--orange); 
        }
        .tape { display: flex; position: absolute; left: 0; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); will-change: transform; padding-left: 50%; }
        .t-item { 
            min-width: 110px; 
            height: 100px; 
            margin: 10px; 
            background: var(--gray); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 10px; 
            border-radius: 10px; 
            border-bottom: 3px solid #333;
            text-align: center;
        }

        /* Модальные окна и Бланк */
        .modal { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: var(--gray); 
            padding: 25px; 
            border: 2px solid var(--orange); 
            z-index: 3000; 
            width: 85%; 
            border-radius: 20px; 
            box-shadow: 0 0 40px #000; 
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2500; }
        
        .form-input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #000; 
            border: 1px solid #444; 
            color: #fff; 
            border-radius: 8px; 
            box-sizing: border-box; 
            outline: none;
        }
        .form-input:focus { border-color: var(--orange); }

        .balance-badge { background: var(--gray); padding: 15px; border-radius: 12px; border-left: 4px solid var(--orange); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-item active" onclick="tab('shop', this)">МАГАЗИН</div>
        <div class="nav-item" onclick="tab('cases', this)">КЕЙСЫ</div>
        <div class="nav-item" onclick="tab('cart', this)">КОРЗИНА (<span id="c-count">0</span>)</div>
    </div>

    <div id="shop" class="section active">
        <div class="balance-badge">
            МОЙ БАЛАНС: <span id="balance-val" style="color:var(--orange)">1500</span> PRN
        </div>
        <div class="shop-grid" id="shop-items"></div>
    </div>

    <div id="cases" class="section">
        <h2 style="color:var(--orange)">РУЛЕТКА УДАЧИ</h2>
        <div class="case-container">
            <div class="case-view">
                <div class="pointer"></div>
                <div class="tape" id="tape"></div>
            </div>
        </div>
        <button id="spin-btn" class="btn" onclick="spin()">КРУТИТЬ ЗА 200 PRN</button>
    </div>

    <div id="cart" class="section">
        <h2 style="color:var(--orange)">ВАШ ЗАКАЗ</h2>
        <div id="cart-list"></div>
        <div id="cart-empty" style="margin: 40px 0; color: #555;">ТУТ ПОКА ПУСТО...</div>
        <div id="cart-summary" style="display:none; margin-top: 20px;">
            <p>ИТОГО: <span id="total-price" style="color:var(--orange)">0</span> PRN</p>
            <button class="btn" style="background:#31b545; color:#fff;" onclick="openOrderForm()">ПРИНЯТЬ И ОФОРМИТЬ</button>
        </div>
    </div>

    <div id="order-overlay" class="overlay"></div>
    <div id="order-modal" class="modal">
        <h3 style="color:var(--orange); margin-top:0;">БЛАНК ЗАКАЗА</h3>
        <p style="font-size: 10px; color: #888;">Заполните данные для выдачи товара:</p>
        <input type="text" id="nick" class="form-input" placeholder="Ник в игре:">
        <input type="text" id="tg_uz" class="form-input" placeholder="Юз в ТГ:">
        <input type="text" id="game_id" class="form-input" placeholder="Айди в игре:">
        <button class="btn" style="background:#31b545; color:#fff;" onclick="confirmOrder()">ОТПРАВИТЬ БОССУ</button>
        <button class="btn" style="background:#444; color:#fff;" onclick="closeOrderForm()">ОТМЕНА</button>
    </div>

    <div id="win-modal" class="modal">
        <h2 style="color:var(--orange)">ПОЗДРАВЛЯЕМ!</h2>
        <p id="win-text"></p>
        <button class="btn" onclick="closeWinModal()">ПРИНЯТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = "https://unstampeded-oxygenic-obdulia.ngrok-free.dev/api/data";
        
        let balance = 1500;
        let cart = [];
        let isSpinning = false;
        const prizeItems = ["VIP СТАТУС", "1000 COINS", "ELITE СКИН", "КЕЙС ЛОЯЛЬНОСТИ", "МЕЧ ПРАВОСУДИЯ"];

        // Переключение вкладок
        function tab(name, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            el.classList.add('active');
        }

        // Наполнение магазина
        const shopCont = document.getElementById('shop-items');
        for(let i=1; i<=8; i++) {
            let price = 100 * i;
            shopCont.innerHTML += `
                <div class="card">
                    <div style="font-size:30px;">🎁</div>
                    <b>ТОВАР #${i}</b><br>
                    <span style="color:var(--orange)">${price} PRN</span>
                    <button class="btn" onclick="addToCart('Товар #${i}', ${price})">В КОРЗИНУ</button>
                </div>`;
        }

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('c-count').innerText = cart.length;
            renderCart();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const summary = document.getElementById('cart-summary');
            const empty = document.getElementById('cart-empty');
            
            list.innerHTML = "";
            let total = 0;

            if(cart.length > 0) {
                empty.style.display = "none";
                summary.style.display = "block";
                cart.forEach((item, index) => {
                    total += item.price;
                    list.innerHTML += `
                        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                            <span>${item.name}</span>
                            <span style="color:var(--orange)">${item.price} PRN</span>
                        </div>`;
                });
                document.getElementById('total-price').innerText = total;
            } else {
                empty.style.display = "block";
                summary.style.display = "none";
            }
        }

        // Работа с бланком
        function openOrderForm() {
            document.getElementById('order-modal').style.display = 'block';
            document.getElementById('order-overlay').style.display = 'block';
        }

        function closeOrderForm() {
            document.getElementById('order-modal').style.display = 'none';
            document.getElementById('order-overlay').style.display = 'none';
        }

        async function confirmOrder() {
            const nick = document.getElementById('nick').value;
            const tg_uz = document.getElementById('tg_uz').value;
            const game_id = document.getElementById('game_id').value;

            if(!nick || !tg_uz || !game_id) return tg.showAlert("Заполните бланк!");

            let total = cart.reduce((a, b) => a + b.price, 0); // Исправлено b.p на b.price

            const payload = {
                action: "buy",
                user_id: tg.initDataUnsafe?.user?.id || "DEBUG",
                items: cart,
                total: document.getElementById('total-price').innerText,
                player_data: { nick, tg: tg_uz, game_id }
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' // Исправляет ошибку хоста с ngrok
                    },
                    body: JSON.stringify(payload)
                });
                tg.showAlert("Заказ отправлен! Ожидайте выдачи.");
                cart = []; renderCart(); document.getElementById('c-count').innerText = 0;
                closeOrderForm();
            } catch(e) { tg.showAlert("Ошибка сервера!"); }
        }

        // Рулетка
        const tape = document.getElementById('tape');
        function initTape() {
            tape.innerHTML = "";
            for(let i=0; i<80; i++) {
                let p = prizeItems[Math.floor(Math.random()*prizeItems.length)];
                tape.innerHTML += `<div class="t-item"><b>${p}</b></div>`;
            }
        }
        initTape();

        function spin() {
            if(isSpinning || balance < 200) return;
            balance -= 200;
            document.getElementById('balance-val').innerText = balance;
            isSpinning = true;
            
            const btn = document.getElementById('spin-btn');
            btn.disabled = true; btn.style.opacity = "0.5";

            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";
            
            const winIdx = 50; 
            const winName = tape.children[winIdx].innerText;

            setTimeout(() => {
                tape.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.1, 1)";
                tape.style.transform = `translateX(-${winIdx * 130}px)`;
            }, 50);

            setTimeout(() => {
                isSpinning = false;
                btn.disabled = false; btn.style.opacity = "1";
                document.getElementById('win-text').innerText = "Ваш приз: " + winName;
                document.getElementById('win-modal').style.display = "block";
                document.getElementById('order-overlay').style.display = "block";
                
                // Отправка выигрыша админу
                fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' // Исправляет ошибку хоста с ngrok
                    },
                    body: JSON.stringify({ action: "spin", win: winName, user_id: tg.initDataUnsafe?.user?.id })
                });
            }, 5500);
        }

        function closeWinModal() {
            document.getElementById('win-modal').style.display = "none";
            document.getElementById('order-overlay').style.display = "none";
        }
    </script>
</body>
</html>
