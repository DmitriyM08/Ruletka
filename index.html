<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            border: 5px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #ff4b2b 0deg 72deg, 
                #ff416c 72deg 144deg, 
                #4facfe 144deg 216deg, 
                #00f2fe 216deg 288deg, 
                #feb47b 288deg 360deg
            );
        }
        .pointer {
            position: absolute;
            top: -20px;
            z-index: 10;
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ffd700;
        }
        .prizes-list {
            margin-top: 30px;
            text-align: center;
        }
        button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            background-color: #ffd700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }
        button:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="pointer"></div>
    <div class="wheel-container" id="wheel">
        <span style="font-weight: bold; font-size: 20px; text-shadow: 1px 1px 5px #000;">🎁</span>
    </div>

    <div class="prizes-list">
        <h2 id="status">Испытай удачу!</h2>
        <div id="result-text"></div>
    </div>

    <button id="spin-button" onclick="spin()">КРУТИТЬ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let canSpin = true;
        const wheel = document.getElementById('wheel');
        const status = document.getElementById('status');
        const prizes = ["Приз 1", "Приз 2", "Приз 3", "Приз 4", "Приз 5"];

        function spin() {
            if (!canSpin) return;
            
            canSpin = false;
            document.getElementById('spin-button').disabled = true;
            
            const randomDegree = Math.floor(Math.random() * 360) + 1800; // Минимум 5 полных кругов
            wheel.style.transform = `rotate(${randomDegree}deg)`;
            
            status.innerText = "Крутим...";

            setTimeout(() => {
                const actualDegree = randomDegree % 360;
                const prizeIndex = Math.floor(actualDegree / 72);
                status.innerText = "Вы выиграли: " + prizes[prizeIndex];
                
                // Кнопка закрытия в Telegram появится снизу
                tg.MainButton.setText("Закрыть рулетку");
                tg.MainButton.show();
                tg.MainButton.onClick(() => tg.close());
            }, 4000);
        }
    </script>
</body>
</html>
